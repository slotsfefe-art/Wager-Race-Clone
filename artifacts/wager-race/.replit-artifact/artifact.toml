kind = "web"
previewPath = "/"
title = "Wager Race"
version = "1.0.0"
id = "artifacts/wager-race"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22914

[services.development]
run = "pnpm --filter @workspace/wager-race run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wager-race", "run", "build" ]
publicDir = "artifacts/wager-race/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22914"
BASE_PATH = "/"
